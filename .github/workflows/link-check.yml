name: Link check

on:
  push:
    paths:
      - "src/lib/states.ts"
      - "src/lib/professionals.ts"
      - "scripts/check-links.mjs"
      - ".github/workflows/link-check.yml"
  pull_request:
    paths:
      - "src/lib/states.ts"
      - "src/lib/professionals.ts"
  schedule:
    # Every Monday at 09:00 UTC — catches agencies that migrate URLs.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check external URLs
        id: check
        run: node scripts/check-links.mjs
      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Scheduled link check found broken or suspicious URLs.\n\n';
            try {
              body += '```\n' + fs.readFileSync('link-check-report.txt', 'utf8') + '\n```';
            } catch (e) {
              body += '(Report file missing — see the Actions run log.)';
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Link check failed: ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['link-check', 'bug'],
            });
